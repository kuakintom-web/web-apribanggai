version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: apri_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-apri_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apri_secure_pass}
      POSTGRES_DB: ${DB_NAME:-apri_banggai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-apri_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apri_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apri_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-apri_user}
      DB_PASSWORD: ${DB_PASSWORD:-apri_secure_pass}
      DB_NAME: ${DB_NAME:-apri_banggai}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - apri_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apri_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - apri_network
    command: npm start

volumes:
  postgres_data:

networks:
  apri_network:
    driver: bridge
